format = "$username$hostname:$directory $ruby$line_break$git_branch${custom.git_dirty}${custom.git_clean} $character"
right_format = "$status"
add_newline = false

[username]
show_always = true
format = "[$user]($style)"
style_user = "bold green"

[hostname]
ssh_only = false
format = "[@$hostname]($style)"
style = "bold green"

[directory]
format = "[$path]($style)"
style = "bold blue"
truncation_length = 8
truncate_to_repo = false

[ruby]
format = "[$symbol($version )]($style)"
style = "red"
symbol = ""

[git_branch]
format = "[$branch]($style)"
style = "blue"

[custom.git_dirty]
command = "printf '✗'"
when = "git rev-parse --git-dir >/dev/null 2>&1 && test -n \"$(git status --porcelain 2>/dev/null)\""
format = "[ $output]($style)"
style = "red"

[custom.git_clean]
command = "printf '✔'"
when = "git rev-parse --git-dir >/dev/null 2>&1 && test -z \"$(git status --porcelain 2>/dev/null)\""
format = "[ $output]($style)"
style = "green"

[character]
success_symbol = '[\$](bold)'
error_symbol = '[\$](bold)'

[status]
disabled = false
format = "[$status ↵]($style)"
style = "red"
